<div class="flex flex-col gap-5 sm:gap-6 px-5 sm:px-8 lg:px-10 py-5 sm:py-6 lg:py-8">
  <div class="flex flex-col gap-1.5">
    <a href="/admin/film" class="text-primary/60 text-[10px] sm:text-[11px] tracking-[1.5px] font-bold hover:text-primary transition w-fit">FILM > TAMBAH FILM</a>
    <h1 class="text-primary font-extrabold text-[28px] sm:text-[32px] lg:text-[36px]">Tambah Film</h1>
    <p class="text-primary/70 text-[12px] sm:text-[14px]">Tambahkan film baru ke katalog bioskop Anda.</p>
  </div>

  <form method="POST" action="/admin/film/tambah" class="bg-dark border border-primary/40 rounded-2xl p-5 sm:p-7 lg:p-8 flex flex-col gap-5 sm:gap-6">
    <div class="flex flex-col lg:flex-row gap-5 sm:gap-6">
      <div class="w-full lg:w-[280px] flex-shrink-0">
        <div class="bg-dark-soft border border-primary/40 rounded-xl p-4 sm:p-5 flex flex-col gap-3 min-h-[280px] sm:min-h-[320px]">
          <div id="poster-preview-wrap" class="relative bg-dark-soft rounded-lg h-[200px] sm:h-[220px] overflow-hidden flex items-center justify-center">
            <img id="poster-preview" src="" alt="Poster preview" class="absolute inset-0 w-full h-full object-cover hidden" />
            <div id="poster-placeholder" class="flex flex-col items-center justify-center gap-2">
              <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-dark flex items-center justify-center">
                <i data-lucide="image" class="w-5 h-5 sm:w-6 sm:h-6 text-primary opacity-60"></i>
              </div>
              <span class="text-primary/50 text-[10px] sm:text-[11px] text-center px-2">Preview poster akan muncul di sini</span>
            </div>
          </div>
          <div class="flex flex-col gap-1.5">
            <div class="flex items-center gap-1">
              <label class="text-primary text-[11px] sm:text-[12px] font-semibold tracking-[0.5px]">URL POSTER</label>
              <span class="text-primary opacity-50 text-[11px]">*</span>
            </div>
            <div class="flex items-center gap-2.5 h-11 px-3 sm:px-4 bg-dark border border-primary/40 rounded-lg">
              <i data-lucide="link" class="w-4 h-4 text-primary opacity-60 flex-shrink-0"></i>
              <input id="poster-url" name="poster_url" type="url" required placeholder="https://picsum.photos/seed/judul/400/600"
                class="flex-1 min-w-0 bg-transparent text-primary text-[12px] sm:text-[13px] placeholder:text-primary/40 focus:outline-none" />
            </div>
          </div>
        </div>
      </div>

      <div class="flex-1 flex flex-col gap-3.5 sm:gap-4 min-w-0">
        <div class="flex flex-col gap-1.5">
          <div class="flex items-center gap-1">
            <label class="text-primary text-[11px] sm:text-[12px] font-semibold tracking-[0.5px]">JUDUL FILM</label>
            <span class="text-primary opacity-50 text-[11px]">*</span>
          </div>
          <input name="judul" type="text" required placeholder="Echoes of the Unknown"
            class="h-11 px-4 bg-dark-soft border border-primary/40 rounded-lg text-primary text-[12px] sm:text-[13px] placeholder:text-primary/40 focus:outline-none focus:border-primary transition-colors" />
        </div>
        <div class="flex flex-col gap-1.5">
          <div class="flex items-center gap-1">
            <label class="text-primary text-[11px] sm:text-[12px] font-semibold tracking-[0.5px]">SINOPSIS</label>
          </div>
          <textarea name="sinopsis" rows="3" required placeholder="Cerita singkat film..."
            class="px-4 py-2.5 sm:py-3 bg-dark-soft border border-primary/40 rounded-lg text-primary text-[12px] sm:text-[13px] placeholder:text-primary/40 focus:outline-none focus:border-primary transition-colors resize-none"></textarea>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
          <div class="flex flex-col gap-1.5">
            <div class="flex items-center gap-1">
              <label class="text-primary text-[11px] sm:text-[12px] font-semibold tracking-[0.5px]">GENRE</label>
              <span class="text-primary opacity-50 text-[11px]">*</span>
            </div>
            <input name="genre" type="text" required placeholder="Fiksi Ilmiah"
              class="h-11 px-4 bg-dark-soft border border-primary/40 rounded-lg text-primary text-[12px] sm:text-[13px] placeholder:text-primary/40 focus:outline-none focus:border-primary transition-colors" />
          </div>
          <div class="flex flex-col gap-1.5">
            <div class="flex items-center gap-1">
              <label class="text-primary text-[11px] sm:text-[12px] font-semibold tracking-[0.5px]">DURASI</label>
              <span class="text-primary opacity-50 text-[11px]">*</span>
            </div>
            <input name="durasi" type="text" required placeholder="2j 28m"
              class="h-11 px-4 bg-dark-soft border border-primary/40 rounded-lg text-primary text-[12px] sm:text-[13px] placeholder:text-primary/40 focus:outline-none focus:border-primary transition-colors" />
          </div>
        </div>
        <div class="flex flex-col gap-1.5">
          <div class="flex items-center gap-1">
            <label class="text-primary text-[11px] sm:text-[12px] font-semibold tracking-[0.5px]">STATUS</label>
            <span class="text-primary opacity-50 text-[11px]">*</span>
          </div>
          <div class="flex items-center justify-between h-11 px-4 bg-dark-soft border border-primary/40 rounded-lg">
            <span class="text-primary text-[12px] sm:text-[13px]">Aktif</span>
            <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-primary opacity-70"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="flex items-center justify-end gap-2.5 sm:gap-3 pt-3 sm:pt-4 border-t border-primary/20">
      <a href="/admin/film" class="text-primary text-[12px] sm:text-[13px] font-semibold px-4 sm:px-5 py-2.5 sm:py-3 rounded-lg hover:bg-white/5 transition">Batal</a>
      <button type="submit" class="bg-primary text-dark font-bold text-[12px] sm:text-[13px] rounded-lg px-4 sm:px-5 py-2.5 sm:py-3 hover:bg-primary-hover transition">Simpan Film</button>
    </div>
  </form>
</div>

<script>
(function() {
  const input = document.getElementById('poster-url');
  const img = document.getElementById('poster-preview');
  const placeholder = document.getElementById('poster-placeholder');
  if (!input || !img || !placeholder) return;

  function updatePreview() {
    const url = input.value.trim();
    if (url) {
      img.src = url;
      img.classList.remove('hidden');
      placeholder.classList.add('hidden');
    } else {
      img.src = '';
      img.classList.add('hidden');
      placeholder.classList.remove('hidden');
    }
  }

  img.addEventListener('error', () => {
    img.classList.add('hidden');
    placeholder.classList.remove('hidden');
  });

  img.addEventListener('load', () => {
    if (input.value.trim()) {
      img.classList.remove('hidden');
      placeholder.classList.add('hidden');
    }
  });

  input.addEventListener('input', updatePreview);
})();
</script>
