<div class="flex flex-col gap-5 sm:gap-6 px-5 sm:px-8 lg:px-10 py-5 sm:py-6 lg:py-8">
  <div class="flex flex-col gap-1.5">
    <a href="/admin/jadwal" class="text-primary/60 text-[10px] sm:text-[11px] tracking-[1.5px] font-bold hover:text-primary transition w-fit">JADWAL TAYANG > TAMBAH JADWAL</a>
    <h1 class="text-primary font-extrabold text-[28px] sm:text-[32px] lg:text-[36px]">Tambah Jadwal</h1>
    <p class="text-primary/70 text-[12px] sm:text-[14px]">Tambahkan jadwal tayang film di studio tertentu.</p>
  </div>

  <form method="POST" action="/admin/jadwal/tambah" class="bg-dark border border-primary/40 rounded-2xl p-5 sm:p-7 lg:p-8 flex flex-col gap-4 sm:gap-5">
    <div class="flex flex-col gap-1.5">
      <div class="flex items-center gap-1">
        <label class="text-primary text-[11px] sm:text-[12px] font-semibold tracking-[0.5px]">FILM</label>
        <span class="text-primary opacity-50 text-[11px]">*</span>
      </div>
      <div class="flex items-center justify-between h-11 px-4 bg-dark-soft border border-primary/40 rounded-lg">
        <select name="film_id" required class="flex-1 bg-transparent text-primary text-[12px] sm:text-[13px] focus:outline-none appearance-none">
          <option value="" class="bg-dark">Pilih film</option>
          {{range .Films}}
          <option value="{{.ID}}" class="bg-dark">{{.Judul}} — {{.Genre}}</option>
          {{end}}
        </select>
        <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-primary opacity-70 flex-shrink-0"></i>
      </div>
    </div>
    <div class="flex flex-col gap-1.5">
      <div class="flex items-center gap-1">
        <label class="text-primary text-[11px] sm:text-[12px] font-semibold tracking-[0.5px]">STUDIO</label>
        <span class="text-primary opacity-50 text-[11px]">*</span>
      </div>
      <div class="flex items-center justify-between h-11 px-4 bg-dark-soft border border-primary/40 rounded-lg">
        <select name="studio_id" required class="flex-1 bg-transparent text-primary text-[12px] sm:text-[13px] focus:outline-none appearance-none">
          <option value="" class="bg-dark">Pilih studio</option>
          {{range .Studios}}
          <option value="{{.ID}}" class="bg-dark">{{.NamaStudio}} ({{.JumlahBaris}} × {{.JumlahKolom}})</option>
          {{end}}
        </select>
        <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-primary opacity-70 flex-shrink-0"></i>
      </div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
      <div class="flex flex-col gap-1.5">
        <div class="flex items-center gap-1">
          <label class="text-primary text-[11px] sm:text-[12px] font-semibold tracking-[0.5px]">TANGGAL</label>
          <span class="text-primary opacity-50 text-[11px]">*</span>
        </div>
        <div class="flex items-center gap-2.5 h-11 px-4 bg-dark-soft border border-primary/40 rounded-lg">
          <i data-lucide="calendar" class="w-4 h-4 text-primary opacity-60 flex-shrink-0"></i>
          <input name="tanggal" type="date" required
            class="flex-1 min-w-0 bg-transparent text-primary text-[12px] sm:text-[13px] focus:outline-none scheme:dark" />
        </div>
      </div>
      <div class="flex flex-col gap-1.5">
        <div class="flex items-center gap-1">
          <label class="text-primary text-[11px] sm:text-[12px] font-semibold tracking-[0.5px]">JAM TAYANG</label>
          <span class="text-primary opacity-50 text-[11px]">*</span>
        </div>
        <div class="flex items-center gap-2.5 h-11 px-4 bg-dark-soft border border-primary/40 rounded-lg">
          <i data-lucide="clock-3" class="w-4 h-4 text-primary opacity-60 flex-shrink-0"></i>
          <input name="jam" type="time" required
            class="flex-1 min-w-0 bg-transparent text-primary text-[12px] sm:text-[13px] focus:outline-none scheme:dark" />
        </div>
      </div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
      <div class="flex flex-col gap-1.5">
        <div class="flex items-center gap-1">
          <label class="text-primary text-[11px] sm:text-[12px] font-semibold tracking-[0.5px]">HARGA (RP)</label>
          <span class="text-primary opacity-50 text-[11px]">*</span>
        </div>
        <input name="harga" type="number" required min="0" placeholder="45000"
          class="h-11 px-4 bg-dark-soft border border-primary/40 rounded-lg text-primary text-[12px] sm:text-[13px] placeholder:text-primary/40 focus:outline-none focus:border-primary transition-colors" />
      </div>
      <div class="flex flex-col gap-1.5">
        <div class="flex items-center gap-1">
          <label class="text-primary text-[11px] sm:text-[12px] font-semibold tracking-[0.5px]">STATUS</label>
          <span class="text-primary opacity-50 text-[11px]">*</span>
        </div>
        <div class="flex items-center justify-between h-11 px-4 bg-dark-soft border border-primary/40 rounded-lg">
          <select name="status" required class="flex-1 bg-transparent text-primary text-[12px] sm:text-[13px] focus:outline-none appearance-none">
            <option value="Aktif" class="bg-dark" selected>Aktif</option>
            <option value="Tidak Aktif" class="bg-dark">Tidak Aktif</option>
            <option value="Selesai" class="bg-dark">Selesai</option>
          </select>
          <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-primary opacity-70 flex-shrink-0"></i>
        </div>
      </div>
    </div>

    <div class="flex items-center justify-end gap-2.5 sm:gap-3 pt-3 sm:pt-4 border-t border-primary/20">
      <a href="/admin/jadwal" class="text-primary text-[12px] sm:text-[13px] font-semibold px-4 sm:px-5 py-2.5 sm:py-3 rounded-lg hover:bg-white/5 transition">Batal</a>
      <button type="submit" class="bg-primary text-dark font-bold text-[12px] sm:text-[13px] rounded-lg px-4 sm:px-5 py-2.5 sm:py-3 hover:bg-primary-hover transition">Simpan Jadwal</button>
    </div>
  </form>
</div>
