<div class="flex flex-col gap-5 sm:gap-6 px-5 sm:px-8 lg:px-10 py-5 sm:py-6 lg:py-8">

  <div class="flex flex-col gap-1.5">
    <a href="/admin/studio"
      class="text-primary/60 text-[10px] sm:text-[11px] tracking-[1.5px] font-bold hover:text-primary transition w-fit">
      STUDIO > TAMBAH STUDIO
    </a>

    <h1 class="text-primary font-extrabold text-[28px] sm:text-[32px] lg:text-[36px]">
      Tambah Studio
    </h1>

    <p class="text-primary/70 text-[12px] sm:text-[14px]">
      Tambahkan studio baru.
    </p>
  </div>

  <form method="POST" action="/admin/studio/tambah"
    class="bg-dark border border-primary/40 rounded-2xl p-5 sm:p-7 lg:p-8 flex flex-col gap-5">

    <div class="flex flex-col gap-1.5">
      <label class="text-primary text-xs font-semibold">
        NAMA STUDIO
      </label>

      <input
        type="text"
        name="nama"
        required
        placeholder="Studio 1"
        class="h-11 px-4 bg-dark-soft border border-primary/40 rounded-lg text-primary focus:outline-none">
    </div>

    <div class="grid grid-cols-2 gap-4">

      <div class="flex flex-col gap-1.5">
        <label class="text-primary text-xs font-semibold">
          JUMLAH BARIS
        </label>

        <input
          type="number"
          name="baris"
          min="1"
          required
          class="h-11 px-4 bg-dark-soft border border-primary/40 rounded-lg text-primary focus:outline-none">
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-primary text-xs font-semibold">
          JUMLAH KOLOM
        </label>

        <input
          type="number"
          name="kursi_per_baris"
          min="1"
          required
          class="h-11 px-4 bg-dark-soft border border-primary/40 rounded-lg text-primary focus:outline-none">
      </div>

    </div>

    <div class="flex justify-end gap-3 pt-4 border-t border-primary/20">

      <a href="/admin/studio"
        class="text-primary px-5 py-3 rounded-lg hover:bg-white/5">
        Batal
      </a>

      <button
        class="bg-primary text-dark font-bold rounded-lg px-5 py-3">
        Simpan Studio
      </button>

    </div>

  </form>

</div>
