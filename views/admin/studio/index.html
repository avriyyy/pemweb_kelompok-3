<div class="flex flex-col gap-5 sm:gap-6 px-5 sm:px-8 lg:px-10 py-5 sm:py-6 lg:py-8">
  <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-3 sm:gap-0">
    <div class="flex flex-col gap-1.5">
      <span class="text-primary/60 text-[10px] sm:text-[11px] font-bold tracking-[1.5px]">MANAJEMEN STUDIO</span>
      <h1 class="text-primary font-extrabold text-[28px] sm:text-[32px] lg:text-[36px]">Manajemen Studio</h1>
      <p class="text-primary/70 text-[12px] sm:text-[14px]">Kelola studio bioskop.</p>
    </div>

    <a href="/admin/studio/tambah"
      class="inline-flex items-center justify-center gap-2 bg-primary text-dark font-bold text-[13px] sm:text-[14px] rounded-xl px-4 sm:px-5 py-2.5 sm:py-3 hover:bg-primary-hover transition w-fit">
      <i data-lucide="plus" class="w-4 h-4"></i>
      <span>Tambah Studio</span>
    </a>
  </div>

  <div class="bg-dark border border-primary/40 rounded-2xl overflow-hidden">
    <div class="overflow-x-auto">

      <table class="w-full min-w-[700px]">

        <thead>
          <tr class="border-b border-primary/20">
            <th class="px-5 py-3 text-left text-primary/60 text-xs">NAMA STUDIO</th>
            <th class="px-4 py-3 text-left text-primary/60 text-xs">JUMLAH BARIS</th>
            <th class="px-4 py-3 text-left text-primary/60 text-xs">JUMLAH KOLOM</th>
            <th class="px-5 py-3 text-right text-primary/60 text-xs">AKSI</th>
          </tr>
        </thead>

        <tbody>

          {{range .Studios}}

          <tr class="border-b border-primary/10 hover:bg-white/[0.02]">

            <td class="px-5 py-4 font-semibold text-primary">
              {{.NamaStudio}}
            </td>

            <td class="px-4 py-4">
              {{.JumlahBaris}}
            </td>

            <td class="px-4 py-4">
              {{.JumlahKolom}}
            </td>

            <td class="px-5 py-4">
              <div class="flex justify-end gap-2">

                <a href="/admin/studio/edit/{{.ID}}"
                  class="w-8 h-8 rounded-lg bg-primary text-dark flex items-center justify-center">
                  <i data-lucide="pencil" class="w-4 h-4"></i>
                </a>

                <form method="POST"
                  action="/admin/studio/hapus/{{.ID}}"
                  onsubmit="return confirm('Yakin ingin menghapus studio ini?')">

                  <button
                    class="w-8 h-8 rounded-lg border border-primary/30 text-primary flex items-center justify-center">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                  </button>

                </form>

              </div>
            </td>

          </tr>

          {{else}}

          <tr>
            <td colspan="4" class="text-center py-10 text-primary/50">
              Belum ada studio.
            </td>
          </tr>

          {{end}}

        </tbody>

      </table>

    </div>
  </div>
</div>
